<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title> 1001 Bicara </title>
    <link rel="stylesheet" href="styles/app.css">
    <!-- Boxicons CDN Link -->
    <link href='https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css' rel='stylesheet'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="card">
        <div class="card__images">
            <p class="card__images-total" id="card-total">
            </p>
            <img id="card-image" src="img/default.webp" alt="card-image">
        </div>
        <div class="card__details">
            <span class="card__details-category" id="card-category">
            </span>
            <p class="card__details-question" id="card-question">
            </p>
        </div>
        <div class="card__button">
            <div class="card__button-layer"></div>
            <button class="card__button-bg" id="generate" onclick="generateCard()">Generate</button>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>

</html>
